<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Painel ESP32</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>⚡ Painel de Controle</h1>

  <div class="card">
    <h2>🌡️ Temperatura</h2>
    <p id="temp">-- °C</p>
  </div>

  <div class="card">
    <h2>🎮 Modo</h2>
    <button onclick="setModo('auto')" id="autoBtn">Automático</button>
    <button onclick="setModo('manual')" id="manualBtn">Manual</button>
    <p id="modoStatus">--</p>
  </div>

  <div class="card">
    <h2>💡 Relés</h2>

    <div class="rele">
      <span>Relé 1</span>
      <button onclick="toggleRele(1)">Toggle</button>
      <span id="r1">OFF</span>
    </div>

    <div class="rele">
      <span>Relé 2</span>
      <button onclick="toggleRele(2)">Toggle</button>
      <span id="r2">OFF</span>
    </div>

    <div class="rele">
      <span>Relé 3</span>
      <button onclick="toggleRele(3)">Toggle</button>
      <span id="r3">OFF</span>
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
